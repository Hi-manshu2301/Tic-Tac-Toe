<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ttt.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <!-- player form -->
        <div id="player-form" class="form-box">
            <input type="text" id="player1" placeholder="Player 1 Name">
            <input type="text" id="player2" placeholder="Player 2 Name">
            <select id="mode">
                <option value="single">Single Player</option>
                <option value="multi">Multiplayer</option>
            </select>
            <!-- <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select> -->
            <button id="submit">Start Game</button>
        </div>

        <!-- game content -->
        <div id="game" style="display: none;">
            
            <div class="message"></div>
            <div class="board">
                <div id="1" class="cell"></div>
                <div id="2" class="cell"></div>
                <div id="3" class="cell"></div>
                <div id="4" class="cell"></div>
                <div id="5" class="cell"></div>
                <div id="6" class="cell"></div>
                <div id="7" class="cell"></div>
                <div id="8" class="cell"></div>
                <div id="9" class="cell"></div>
            </div>
            <button id="restartBtn">Restart Game</button>

        </div>
    </div>
    <script src="ttt.js"></script>
    
    
</body>
</html>
